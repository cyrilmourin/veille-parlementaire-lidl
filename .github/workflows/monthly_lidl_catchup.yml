name: Veille parlementaire Lidl — catchup mensuel (marque Lidl, 18 mois)

on:
  schedule:
    # 1er du mois, 03h UTC (04h/05h Paris — hors heure du daily à 06h UTC).
    - cron: "0 3 1 * *"
  workflow_dispatch:
    inputs:
      since_days:
        description: "Fenêtre du catch-up en jours"
        required: false
        default: "540"

# Le catch-up ratisse tous les items des 18 derniers mois qui mentionnent
# littéralement « Lidl » dans leur texte, et les pose en base avec
# matched_keywords=["Lidl"]. Pas de contexte exigé — la marque est sans
# ambiguïté. Objectif : ne rien manquer qui concerne directement le groupe.
# Pas d'email (trop de contenu sur 18 mois), juste enrichissement base +
# export site.

permissions:
  contents: write
  pages: write
  id-token: write
  actions: write

concurrency:
  group: veille-lidl-catchup
  cancel-in-progress: false

jobs:
  catchup:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Restore SQLite cache
        uses: actions/cache@v4
        with:
          path: data/veille.sqlite3
          key: veille-lidl-sqlite-v1-${{ github.run_id }}
          restore-keys: |
            veille-lidl-sqlite-v1-

      - name: Refresh AMO cache (weekly)
        continue-on-error: true
        run: |
          python -m scripts.refresh_amo_cache --max-age-days 7

      - name: Run pipeline catch-up Lidl
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
          SITE_URL: "https://veille-lidl.sideline-conseil.fr"
        run: |
          SINCE="${{ github.event.inputs.since_days || '540' }}"
          python -m src.main run --since "$SINCE" --catchup-lidl --no-email -v

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.128.0"
          extended: true

      - name: Build Hugo site
        working-directory: site
        run: |
          rm -rf public
          hugo --minify --baseURL "https://veille-lidl.sideline-conseil.fr/"

      - name: Purge stale github-pages artifacts from this run
        uses: actions/github-script@v7
        with:
          script: |
            const { data: { artifacts } } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
              per_page: 100,
            });
            const stale = artifacts.filter(a => a.name === 'github-pages');
            for (const a of stale) {
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: a.id,
              });
            }

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/public

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

      - name: Commit catchup caches
        if: always()
        run: |
          git config user.name "veille-bot"
          git config user.email "veille-bot@sideline-conseil.fr"
          git add data/last_digest.html data/amo_resolved.json data/an_texte_to_dossier.json data/an_cr_state.json data/pipeline_health.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: catchup Lidl $(date -u +%Y-%m-%d)"
          git push || true
