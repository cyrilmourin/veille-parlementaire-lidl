baseURL = "https://veille-lidl.sideline-conseil.fr/"
languageCode = "fr-fr"
title = "Veille Institutionnelle Lidl — Sideline Conseil"
enableRobotsTXT = true

# Défense en profondeur : ne pas masquer une page dont `date:` tombe dans le
# futur à cause d'un écart de fuseau build/navigateur.
buildFuture = true
buildExpired = true

# 50 items par page dans les listings.
paginate = 50

[pagination]
  pagerSize = 50

[params]
  description = "Veille parlementaire & institutionnelle — grande distribution alimentaire, compte Lidl France."
  author = "Sideline Conseil"
  # Accroche Sideline conservée, affichée discrètement sous le logo Sideline.
  tagline = "Voir clair. Jouer juste."
  # Palette Lidl : bleu primaire, jaune secondaire, rouge CTA.
  accent = "#0050AA"
  accent2 = "#E60A14"
  mailto = "cyrilmourin@sideline-conseil.fr"
  client_mail = "ANOUCK.PAUMARD@lidl.fr"

[markup.goldmark.renderer]
  unsafe = true

[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML", "RSS"]

[permalinks]
  items = "/:section/:slug/"
