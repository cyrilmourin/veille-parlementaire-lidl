    - id: autorite_concurrence
      category: communiques
      url: https://www.autoritedelaconcurrence.fr/fr/communiques-de-presse
      format: html
      fetch_meta: true
      fetch_meta_limit: 40
      poids: 3

    # DGCCRF — rubrique actualités (communiqués de contrôle, rappels,
    # rapports annuels). URL stable sur economie.gouv.fr.
    - id: dgccrf
      category: communiques
      url: https://www.economie.gouv.fr/dgccrf/Publications/Actualites-DGCCRF
      format: html
      impersonate: true
      chamber: DGCCRF
      title_prefix: "DGCCRF —"
      fetch_meta: true
      fetch_meta_limit: 40
      poids: 3

    # RappelConso — flux des rappels produits. Fort signal si une
    # enseigne Lidl/Carrefour/Leclerc est citée. API data.gouv.fr exposée
    # en JSON + flux RSS public. À confirmer en recette : endpoint RSS
    # officiel = https://rappel.conso.gouv.fr/feed.
    - id: rappelconso
      category: communiques
      url: https://rappel.conso.gouv.fr/feed
      format: rss
      chamber: RappelConso
      title_prefix: "RappelConso —"

    # Cour des comptes — rapports thématiques (EGalim, GD, outre-mer).
