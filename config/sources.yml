      category: communiques
      url: https://librairie.ademe.fr/changement-climatique-et-energie/cat/7/publications-recentes.html
      format: html
      chamber: ADEME
      title_prefix: "ADEME —"
      fetch_meta: true
      fetch_meta_limit: 40
      enabled: false

# ============================================================================
# ORGANISATIONS REPRÉSENTATIVES — syndicats patronaux et professionnels
# ============================================================================
# Filtre UI regroupé sous "Organisations représentatives" via le préfixe
# `org_` (cf. _SOURCE_FAMILY_BY_PREFIX côté site_export). URLs best-effort
# à valider à la recette ; toutes désactivées par défaut en attendant.
organisations:
  sources:
    # FCD — Fédération du Commerce et de la Distribution (patronale GD).
    # Cœur de cible : position officielle des enseignes sur EGalim,
    # SRP+10, négociations commerciales.
    # Flux : pas de RSS exposé. La page /presse/ répond 200 (36 Ko).
    # Les articles détaillés vivent sous /qui-sommes-nous/actualites-de-la-fcd/.
    # Vérifié live 2026-04-24 (HTTP 200, 36 Ko).
    - id: org_fcd
      category: communiques
      url: https://www.fcd.fr/presse/
      format: html
      chamber: FCD
      title_prefix: "FCD —"
      fetch_meta: true
      fetch_meta_limit: 40

    # ANIA — Association Nationale des Industries Alimentaires
    # (industriels fournisseurs de la GD). Flux RSS WordPress officiel.
    # Vérifié live 2026-04-24 (HTTP 200, application/rss+xml).
    - id: org_ania
      category: communiques
      url: https://www.ania.net/feed/
      format: rss
      chamber: ANIA
      title_prefix: "ANIA —"

    # FNSEA — syndicat agricole majoritaire. Cœur EGalim côté amont.
    # Flux RSS WordPress officiel. Vérifié live 2026-04-24 (HTTP 200, RSS).
    - id: org_fnsea
      category: communiques
      url: https://www.fnsea.fr/feed/
      format: rss
      chamber: FNSEA
      title_prefix: "FNSEA —"

    # APCA — Chambres d'agriculture (Assemblée permanente).
    # Pas de RSS exposé. Scraping /espace-presse (TYPO3, 99 Ko).
    # Vérifié live 2026-04-24 (HTTP 200).
    - id: org_apca
      category: communiques
      url: https://chambres-agriculture.fr/espace-presse
      format: html
      chamber: APCA
      title_prefix: "APCA —"
      fetch_meta: true
      fetch_meta_limit: 40

    # Coordination rurale — 2e syndicat agricole, souvent critique des GMS.
    # Flux RSS WordPress (/feed). Vérifié live 2026-04-24 (HTTP 200, 220 Ko).
    - id: org_coordination_rurale
      category: communiques
      url: https://www.coordinationrurale.fr/feed
      format: rss
      chamber: CoordinationRurale
      title_prefix: "Coord. rurale —"

    # Confédération paysanne — 3e syndicat, volet distribution / contrats.
    # Pas de flux RSS identifié ; home contient des liens actu.php?id=N.
    # Scraping générique de la home (56 Ko). Enabled false pour la v1 :
    # le listing n'est pas stable, on laissera Cyril activer après
    # audit manuel du rendu.
    - id: org_confederation_paysanne
      category: communiques
      url: https://www.confederationpaysanne.fr/
      format: html
      chamber: ConfPaysanne
      title_prefix: "Conf. paysanne —"
      fetch_meta: true
      fetch_meta_limit: 40
      enabled: false

    # Jeunes Agriculteurs — positions sur installation et contrats GD.
    # Flux RSS WordPress (/feed sans slash — avec slash = 301).
    # Vérifié live 2026-04-24 (HTTP 200, RSS).
    - id: org_jeunes_agriculteurs
      category: communiques
      url: https://jeunes-agriculteurs.fr/feed
      format: rss
      chamber: JeunesAgri
      title_prefix: "JA —"

    # UFC-Que Choisir — association consommateurs, observateur prix /
    # étiquetage. Flux RSS officiel déclaré en <link rel=alternate> sur
    # /salle-de-presse/. Vérifié live 2026-04-24.
    - id: org_ufc
      category: communiques
      url: https://www.quechoisir.org/utils/flux
      format: rss
      chamber: UFC
      title_prefix: "UFC —"

    # Foodwatch France — ONG ciblant l'industrie et la GD alimentaire.
