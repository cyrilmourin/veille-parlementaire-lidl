# Inventaire des sources — veille parlementaire Lidl (Sideline Conseil)
# Validé en live (héritage projet sport) sur data.assemblee-nationale.fr,
# data.senat.fr et les portails officiels. Portée resserrée vers la grande
# distribution : les sources sport-specifics (ANS, AFLD, INSEP, ARCOM, ANJ,
# CNOSF, FDSF, Alpes 2030, INJEP, IGESR, Défenseur des droits) ont été
# retirées ; les ministères sport/éducation/armées/culture/affaires
# étrangères/justice également.
#
# Catégories Follaw.sv :
#   dossiers_legislatifs | jorf | amendements | questions | comptes_rendus
#   publications        | nominations | agenda | communiques

# ============================================================================
# PARLEMENT — Assemblée nationale
# ============================================================================
assemblee_nationale:
  base: https://data.assemblee-nationale.fr/static/openData/repository/17
  sources:
    - id: an_dossiers_legislatifs
      category: dossiers_legislatifs
      url: https://data.assemblee-nationale.fr/static/openData/repository/17/loi/dossiers_legislatifs/Dossiers_Legislatifs.json.zip
      format: json_zip

    - id: an_amendements
      category: amendements
      url: https://data.assemblee-nationale.fr/static/openData/repository/17/loi/amendements_div_legis/Amendements.json.zip
      format: json_zip
      since_days: 30

    - id: an_questions_ecrites
      category: questions
      url: https://data.assemblee-nationale.fr/static/openData/repository/17/questions/questions_ecrites/Questions_ecrites.json.zip
      format: json_zip
      since_days: 30

    - id: an_questions_gouvernement
      category: questions
      url: https://data.assemblee-nationale.fr/static/openData/repository/17/questions/questions_gouvernement/Questions_gouvernement.json.zip
      format: json_zip
      since_days: 30

    - id: an_questions_orales_sans_debat
      category: questions
      url: https://data.assemblee-nationale.fr/static/openData/repository/17/questions/questions_orales_sans_debat/Questions_orales_sans_debat.json.zip
      format: json_zip
      since_days: 30

    - id: an_agenda
      category: agenda
      url: https://data.assemblee-nationale.fr/static/openData/repository/17/vp/reunions/Agenda.json.zip
      format: json_zip
      since_days: 30

    - id: an_syceron
      category: comptes_rendus
      url: https://data.assemblee-nationale.fr/static/openData/repository/17/vp/syceronbrut/syseron.xml.zip
      format: xml_zip
      since_days: 30

    - id: an_rapports
      category: communiques
      url: https://www2.assemblee-nationale.fr/documents/liste?type=rapports&legis=17
      format: an_rapports_html

    - id: an_cr_commissions
      category: comptes_rendus
      url: https://www.assemblee-nationale.fr/dyn/17/comptes-rendus/
      format: an_cr_commissions
      max_new_per_run: 10
      # miss_tolerance élevé pour le premier run : sans state, on part
      # de max_num=99 en scan descendant, et la session en cours n'a
      # que ~30-40 CR par commission. 80 misses tolérés permet d'arriver
      # jusqu'à num=19, largement assez pour peupler le state. Les runs
      # suivants (avec state rempli) n'en consommeront que 0-1 par exécution.
      miss_tolerance: 80
      max_num: 99

# ============================================================================
# PARLEMENT — Sénat
# ============================================================================
senat:
  sources:
    - id: senat_akn_depots
      category: dossiers_legislatifs
      url: https://www.senat.fr/akomantoso/depots.xml
      format: akn_index
      since_days: 90

    - id: senat_akn_adoptions
      category: dossiers_legislatifs
      url: https://www.senat.fr/akomantoso/adoptions.xml
      format: akn_index
      since_days: 90

    - id: senat_dosleg
      category: dossiers_legislatifs
      url: https://data.senat.fr/data/dosleg/dosleg.csv.zip
      format: csv_zip

    - id: senat_ppl
      category: dossiers_legislatifs
      url: https://data.senat.fr/data/ppl/ppl.csv.zip
      format: csv_zip

    - id: senat_rapports
      category: communiques
      url: https://data.senat.fr/data/rapports/rapports.csv.zip
      format: csv_zip

    - id: senat_promulguees
      category: dossiers_legislatifs
      url: https://data.senat.fr/data/loisprom/loisprom.csv.zip
      format: csv_zip

    - id: senat_amendements
      category: amendements
      url: https://data.senat.fr/amendements/
      format: senat_amendements
      since_days: 30

    - id: senat_questions
      category: questions
      url: https://data.senat.fr/data/questions/questions.csv.zip
      format: csv_zip

    - id: senat_qg
      category: questions
      url: https://data.senat.fr/data/questions/qg.csv.zip
      format: csv_zip

    - id: senat_questions_1an
      category: questions
      url: https://data.senat.fr/data/questions/questions-1an.csv.zip
      format: csv_zip

    - id: senat_debats
      category: comptes_rendus
      url: https://data.senat.fr/data/debats/debats.csv.zip
      format: csv_zip

    - id: senat_cri
      category: comptes_rendus
      url: https://data.senat.fr/data/debats/cri.zip
      format: csv_zip

    - id: senat_rss
      category: communiques
      url: https://data.senat.fr/feed/actualites-rss.xml
      format: rss

    # Agenda global Sénat — bloqué par WAF (vu sur projet sport). Laissé
    # désactivé, on passe par les pages commissions (bloc ci-dessous).
    - id: senat_agenda
      category: agenda
      url: https://www.senat.fr/agenda/
      format: senat_agenda_daily
      before_days: 7
      after_days: 30
      printable: true
      enabled: false

    # Commission des affaires économiques Sénat — cœur de cible GD
    # (EGalim, négociations, urbanisme commercial).
    # À renseigner par Cyril au premier run : URL exacte de la page agenda
    # de la commission (structure identique à celle utilisée côté culture
    # sur le projet sport).
    - id: senat_agenda_affaires_economiques
      category: agenda
      url: https://www.senat.fr/travaux-parlementaires/commissions/commission-des-affaires-economiques/agenda-de-la-commission.html
      format: senat_commission_agenda_html
      commission_label: Commission des affaires économiques
      commission_organe: PO78718

    # Commission de l'aménagement du territoire et du développement
    # durable Sénat — volet urbanisme commercial (CDAC/CNAC, ZAN, friches).
    - id: senat_agenda_amenagement
      category: agenda
      url: https://www.senat.fr/travaux-parlementaires/commissions/commission-de-lamenagement-du-territoire-et-du-developpement-durable/agenda-de-la-commission.html
      format: senat_commission_agenda_html
      commission_label: Commission aménagement du territoire et développement durable
      commission_organe: PO78664

    # --- R37-A (2026-04-24) — CR commissions Sénat -------------------------
    # Scrape /compte-rendu-commissions/<slug>.html (listing hebdo) puis
    # fetch chaque CR unitaire pour alimenter haystack_body. Trois
    # commissions retenues côté Lidl (cœur grande distribution) :
    # affaires économiques (EGalim, négo commerciales), aménagement du
    # territoire (urbanisme commercial), affaires sociales (travail
    # dominical, convention collective commerce).
    # Slugs Sénat courts vérifiés live 2026-04-24 :
    #   economie.html, developpement-durable.html, affaires-sociales.html
    # (les autres variantes testées — affaires-economiques, amenagement-du-
    # territoire-*, aff-eco, etc. — renvoient toutes 404).
    - id: senat_cr_affaires_economiques
      category: comptes_rendus
      url: https://www.senat.fr/compte-rendu-commissions/economie.html
      format: senat_cr_commissions_html
      commission_label: Commission des affaires économiques (Sénat)
      commission_organe: PO78718
      max_new_per_run: 8
      body_max_chars: 10000

    - id: senat_cr_amenagement
      category: comptes_rendus
      url: https://www.senat.fr/compte-rendu-commissions/developpement-durable.html
      format: senat_cr_commissions_html
      commission_label: Commission de l'aménagement du territoire et du développement durable (Sénat)
      commission_organe: PO78664
      max_new_per_run: 8
      body_max_chars: 10000

    - id: senat_cr_affaires_sociales
      category: comptes_rendus
      url: https://www.senat.fr/compte-rendu-commissions/affaires-sociales.html
      format: senat_cr_commissions_html
      commission_label: Commission des affaires sociales (Sénat)
      commission_organe: PO211493
      max_new_per_run: 8
      body_max_chars: 10000

