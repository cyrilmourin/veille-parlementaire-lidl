      url: https://mediation-agriculture.agriculture.gouv.fr/
      format: html
      chamber: MediateurAgri
      title_prefix: "Médiateur —"
      fetch_meta: true
      fetch_meta_limit: 40
      enabled: false

    # ADEME — publications emballages / gaspillage alimentaire.
