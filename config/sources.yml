# ============================================================================
# MINISTÈRES — périmètre Lidl resserré
# ============================================================================
ministeres:
  sources:
    # Économie / Commerce / Consommation — cœur de cible (EGalim, négociations,
    # DGCCRF, SRP+10)
    - id: min_economie
      category: communiques
      url: https://presse.economie.gouv.fr/
      format: html
      impersonate: true
      chamber: MinEcon
      title_prefix: "MinEcon —"
      fetch_meta: true
      fetch_meta_limit: 40
      poids: 3

    # Agriculture & souveraineté alimentaire — volet EGalim, contrats amont,
    # matières premières.
    - id: min_agriculture
      category: communiques
      url: https://agriculture.gouv.fr/presse
      format: html
      impersonate: true
      chamber: MinAgri
      title_prefix: "MinAgri —"
      fetch_meta: true
      fetch_meta_limit: 40
      poids: 3

    # Transition écologique — volet loi AGEC, REP emballages, vrac, plastique.
    - id: min_transition_ecologique
      category: communiques
      url: https://www.ecologie.gouv.fr/presse
      format: html
      fetch_meta: true
      fetch_meta_limit: 40

    # Travail — volet travail dominical, convention collective commerce
    # de détail. La rubrique /actualites/presse était bloquée par F5 ASM
    # sur l'instance sport ; laissée désactivée, à tenter avec Playwright
    # si besoin en v2.
    - id: min_travail
      category: communiques
      url: https://travail-emploi.gouv.fr/actualites/presse
      format: html
      enabled: false

    # Ministère délégué aux Outre-mer — volet BQP / oligopoles.
    # URL à vérifier en recette : le portail outre-mer a changé d'arbo
    # plusieurs fois. Fallback via info.gouv.fr si indispo.
    - id: min_outremer
      category: communiques
      url: https://www.outre-mer.gouv.fr/presse
      format: html
      fetch_meta: true
      fetch_meta_limit: 40

    # Intérieur — marginal (sécurité des grandes surfaces pendant
    # événements). Désactivé par défaut, à réactiver si pertinent.
    - id: min_interieur
      category: communiques
      url: https://www.interieur.gouv.fr/actualites/presse
      format: html
      impersonate: true
      chamber: MinInterieur
      title_prefix: "MinInt —"
      fetch_meta: true
      fetch_meta_limit: 40
      enabled: false

