# Red list — URLs explicitement exclues du site et du digest.
#
# Mécanisme : avant le rendu Hugo, les rows dont l'URL canonique
# (sans scheme, sans fragment text-fragment, sans trailing slash)
# matche une entrée de cette liste sont droppés.
#
# Quand utiliser la red list plutôt que de modifier le lexique ?
#   - L'item est un faux positif unique malgré un lexique sain
#     (cas tordu : co-occurrence accidentelle, fiche député qui
#     mentionne incidemment un nom d'enseigne, etc.).
#   - L'item resterait pertinent en théorie mais le contexte
#     concret est hors GD (ex. amendement « char Leclerc » sur
#     PJL militaire — Leclerc a un sens distinct ici).
#
# Quand modifier le lexique plutôt ? Quand le faux positif est
# représentatif d'une famille (ex. « Autorité de la concurrence »
# remontant régulièrement sur télécoms/médias/finance) — alors on
# resserre le keyword globalement et la red list ne sert plus.
#
# Format : liste plate sous `urls:`. Une URL par ligne. Le scheme,
# le fragment `#:~:text=…` et le trailing slash sont ignorés à la
# comparaison.

urls:
