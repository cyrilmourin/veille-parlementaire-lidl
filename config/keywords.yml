      - E Leclerc
      - centres Leclerc
      - Galec
      - ACDLec
      - Michel-Edouard Leclerc
      - Michel Edouard Leclerc
      - Leclerc Drive
      - coopérative Leclerc
      # Note : « MEL » retiré des markers — trop court, homonyme (acronyme
      # Métropole Européenne de Lille, Martin E. Lichtenberg, etc.).

  - term: Cora
    mode: contextual
    requires_any:
      - enseigne Cora
      - hypermarché Cora
      - groupe Cora
      - Louis Delhaize

  - term: Ed
