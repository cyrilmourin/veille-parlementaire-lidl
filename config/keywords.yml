# Dictionnaire de mots-clés — veille parlementaire Lidl (Sideline Conseil)
# Matching insensible à la casse et aux accents (voir src/keywords.py).
# Chaque terme peut contenir des espaces et des chiffres. Les variantes
# orthographiques sont listées explicitement (pas de stemming).
#
# Familles : acteur | groupe | dirigeant | theme | dispositif | evenement
#
# Chaque entrée peut prendre trois formes :
#
#   1. String simple (mode direct, rétro-compat)
#   2. { term: "X", mode: "direct" }
#   3. { term: "X", mode: "contextual", requires_any: [ ... ] }
#
# Règle de matching contextuel : le terme est retenu si au moins UN
# des requires_any apparaît dans le haystack (titre + résumé + corps
# éventuel). Les requires_any sont choisis distinctifs — on évite les
# mots COURTS et ambigus seuls ("distributeur", "enseigne", "magasin")
# car ils apparaissent dans des textes longs (JORF, dossiers AN avec
# libelles_haystack cumulés) sans rapport avec le sujet principal.
#
# 2026-04-26 (P1c) : les EXPRESSIONS MULTI-MOTS distinctives de la GD
# alimentaire ont été promues en mode direct ("grande distribution",
# "grande distribution alimentaire", "hard-discount", "discount
# alimentaire", "marque de distributeur") car elles relèvent du jargon
# précis (jamais en santé / éducation / défense). EXCLUS sur demande
# Cyril : "commerce alimentaire", "commerce de détail (alimentaire)",
# "distribution alimentaire", "centrale d'achat" (jugés trop larges).
# L'argument anti-bruit historique ("char Leclerc") tenait au cache DB
# stale après resserrement du requires_any de Leclerc, pas à la chaîne
# "grande distribution" qui n'aurait pas pu causer ce match.

