  - Reduflation
  # P1a (2026-04-24) — formulations longues caractéristiques des titres
  # des textes législatifs GD des 3 dernières années. Ces chaînes n'appa-
  # raissent quasi nulle part ailleurs → direct sans requires_any.
  - Marges de la grande distribution
  - Marges des industriels et de la grande distribution
  - Équilibre dans les relations commerciales entre fournisseurs et distributeurs
  - Equilibre dans les relations commerciales entre fournisseurs et distributeurs
  - Négociations commerciales dans la grande distribution
  - Negociations commerciales dans la grande distribution
  - Transparence dans les relations commerciales

  # P1c (2026-04-26) — expressions distinctives de la GD alimentaire
  # promues en direct. Couvre les textes qui mentionnent explicitement
  # le secteur sans nommer une enseigne précise (cas du PJL souveraineté
  # alimentaire ou des PPR commissions d'enquête).
  # Décision Cyril : on EXCLUT "commerce alimentaire", "commerce de
  # détail (alimentaire)", "distribution alimentaire", "centrale d'achat"
  # (jugés trop larges, possible bruit hors GD ou amont agricole) et on
  # n'admet que les expressions GD pures.
  - Grande distribution
  - Grande distribution alimentaire
  - Hard-discount
  - Hard discount
  - Discount alimentaire

  # --- Contextuel -----------------------------------------------------------
