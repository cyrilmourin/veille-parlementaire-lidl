# Dictionnaire de mots-clés — veille parlementaire Lidl (Sideline Conseil)
# Matching insensible à la casse et aux accents (voir src/keywords.py).
# Chaque terme peut contenir des espaces et des chiffres. Les variantes
# orthographiques sont listées explicitement (pas de stemming).
#
# Familles : acteur | groupe | dirigeant | theme | dispositif | evenement
#
# Chaque entrée peut prendre trois formes :
#
#   1. String simple (mode direct, rétro-compat)
#   2. { term: "X", mode: "direct" }
#   3. { term: "X", mode: "contextual", requires_any: [ ... ] }
#
# Règle de matching contextuel : le terme est retenu si au moins UN
# des requires_any apparaît dans le haystack (titre + résumé + corps
# éventuel). Les requires_any sont choisis TRÈS distinctifs — on
# évite les marqueurs trop génériques ("grande distribution", "enseigne"
# seuls) car ils apparaissent dans des textes longs (JORF, dossiers AN
# avec libelles_haystack cumulés) sans rapport avec le sujet principal.

